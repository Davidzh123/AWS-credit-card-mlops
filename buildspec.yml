version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing dependencies"
      - pip install --upgrade pip
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Running tests"
      - pytest tests/

  build:
    commands:
      - echo "Launching SageMaker ML pipeline"
      - python pipelines/pipeline.py

  post_build:
    commands:
      - echo "CI/CD ML finished"
