version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install --upgrade pip
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Running tests"
      - pytest tests/ || true

  build:
    commands:
      - echo "Launching SageMaker pipeline"
      - python pipelines/pipeline.py
